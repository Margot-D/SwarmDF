# =========================
# General setup 
# Main configuration of the SwarmDF run
# See demo notebook for detailed explanation of each parameter
# =========================

sat_id: "Swarm A"

start_time: "2014-12-15 01:18:00"
end_time: "2014-12-15 01:19:00"

timestep: 30.0 # [s]

datasets2download:
  - swarm_mag
  - swarm_efi
  - superdarn
  - supermag
  - iridium_ampere
  - dmsp_ssies17
  - dmsp_ssies18

conductance_method: "Zhang & Paxton model"
conductance_params:
  kp: 4
  f107: 100.0
  background: 2.0

grid_params:
  L: 2000.0 # [km]
  W: 1500.0
  Lres: 200.0
  Wres: 200.0
  wshift: 0.0

run_lompe_flag: true
regularization_l1: 1.0
regularization_l2: 1.0

run_validation_flag: false
time_offset: 0
snapshot: 0